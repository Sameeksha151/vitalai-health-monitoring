<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>VitalAI Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1a0f3b,#3f4fc4);
}

.login-box{
background:white;
padding:40px;
border-radius:16px;
width:360px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
color:#111827;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#7c3aed,#a855f7);
color:white;
font-weight:600;
font-size:15px;
cursor:pointer;
}

button:hover{
opacity:.9;
}

p{
text-align:center;
margin-top:15px;
font-size:14px;
}

a{
color:#7c3aed;
text-decoration:none;
font-weight:600;
}

</style>

</head>

<body>

<form method="POST">

<h2>Login to VitalAI</h2>

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

<p>Don't have an account?</p>

<a href="/signup">Create account</a>

</form>
</body>
</html>
