<!DOCTYPE html>
<html>
<head>

<title>Sign Up - VitalAI</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#1a0f3b,#3f4fc4);
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#7c3aed;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<form class="box" method="POST">

<h2>Create Account</h2>

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Sign Up</button>

<p>Already have an account?</p>

<a href="/login">Login</a>

</form>

</body>
</html>
